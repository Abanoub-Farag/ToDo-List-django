{% extends "base.html" %}

{% block content %}

<a href="{% url 'create_task' %}">Create New Task</a>

{% for task in tasks %}
<li>
<!-- Access attributes of the student object -->
{{ forloop.counter }}. {{ task.title }} <a href="delete_task/{{task.id}}">Delete Task</a>
</li>
{% empty %}
<!-- This block is displayed if the 'students' list is empty -->
<li>empty tasks</li>
{% endfor %}

{% endblock content %}
